LABEL haifa_nbd
TEXT HELP
Boot the Haifa OS live medium using NBD.
It allows you to install Haifa OS or perform system maintenance.
ENDTEXT
MENU LABEL Haifa OS Live Medium (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archiso_nbd_srv=${pxeserver} cms_verify=y
SYSAPPEND 3

