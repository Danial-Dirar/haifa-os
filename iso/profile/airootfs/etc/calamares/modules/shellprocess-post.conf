dontChroot: false
timeout: 180

commands:
  # Initialize pacman keyring on the installed system
  - command: "pacman-key --init"
    verbose: true
  - command: "pacman-key --populate archlinux"
    verbose: true

  # Add CachyOS keyring so updates work after install
  - command: >
      pacman -U --noconfirm
      https://mirror.cachyos.org/repo/x86_64/cachyos/cachyos-keyring-3-1-any.pkg.tar.zst
      https://mirror.cachyos.org/repo/x86_64/cachyos/cachyos-mirrorlist-18-1-any.pkg.tar.zst
    verbose: true

  # Rebuild initramfs with the correct (non-archiso) mkinitcpio config
  - command: "mkinitcpio -p linux-cachyos"
    verbose: true

  # Ensure NetworkManager controls DNS resolution
  - command: "ln -sf /run/systemd/resolve/stub-resolv.conf /etc/resolv.conf"
    verbose: true
