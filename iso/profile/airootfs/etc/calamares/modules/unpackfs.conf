unpack:
  - source: /run/archiso/bootmnt/haifa/x86_64/airootfs.sfs
    sourcefs: squashfs
    destination: ""
    exclude:
      # Calamares itself — not needed on installed system
      - etc/calamares

      # Live ISO initramfs config — archiso hooks must NOT go to installed system
      # The installed system uses /etc/mkinitcpio.conf (standard hooks)
      - etc/mkinitcpio.conf.d/archiso.conf
      # Live ISO kernel preset override — linux-cachyos package provides its own
      - etc/mkinitcpio.d/linux.preset

      # Live ISO pacman keyring — Calamares re-initializes this
      - etc/pacman.d/gnupg

      # Live ISO auto-login and automation scripts
      - root/.automated_script.sh
      - root/.zlogin
      - etc/systemd/system/getty@tty1.service.d

      # Live ISO-only systemd services
      - etc/systemd/system/choose-mirror.service
      - etc/systemd/system/livecd-alsa-unmuter.service
      - etc/systemd/system/livecd-talk.service
      - etc/systemd/system/pacman-init.service
      - etc/systemd/system/etc-pacman.d-gnupg.mount

      # Live ISO pacman hooks
      - etc/pacman.d/hooks/uncomment-mirrors.hook
      - etc/pacman.d/hooks/zzzz99-remove-custom-hooks-from-airootfs.hook
