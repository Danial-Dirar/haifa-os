# /etc/mkinitcpio.conf — Haifa OS (installed system)
# This file is used by Calamares after installation to build the real initramfs.
# The live ISO uses /etc/mkinitcpio.conf.d/archiso.conf instead.

MODULES=()
BINARIES=()
FILES=()

HOOKS=(base udev autodetect microcode modconf kms keyboard keymap consolefont block filesystems fsck)

COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-2)
